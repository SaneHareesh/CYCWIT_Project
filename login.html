<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login to CYCWIT — Choose Your Career With Information Technology." />
    <title>Login — CYCWIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #f0f0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background orbs */
        .bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
            top: -150px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #2563eb, transparent 70%);
            bottom: -100px;
            right: -80px;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            top: 50%;
            left: 60%;
            animation-delay: -5s;
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(32px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.03em;
            margin-bottom: 32px;
            justify-content: center;
        }

        .logo-icon {
            font-size: 1.55rem;
            filter: drop-shadow(0 0 12px rgba(124, 58, 237, 0.8));
        }

        .logo-accent {
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #9494b8;
            text-align: center;
            margin-bottom: 32px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: #9494b8;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: rgba(124, 58, 237, 0.3);
            color: #f0f0ff;
            border: 1px solid rgba(124, 58, 237, 0.4);
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #9494b8;
            margin-bottom: 7px;
            letter-spacing: 0.02em;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f0ff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input::placeholder {
            color: #5c5c7a;
        }

        input:focus {
            border-color: rgba(124, 58, 237, 0.6);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            background: rgba(255, 255, 255, 0.09);
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #06b6d4 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.97rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.55);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #5c5c7a;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Google button */
        .btn-google {
            width: 100%;
            padding: 13px;
            background: rgba(255, 255, 255, 0.06);
            color: #f0f0ff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-google svg {
            flex-shrink: 0;
        }

        /* Alert/Error */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .alert.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #5c5c7a;
        }

        .footer-note a {
            color: #a78bfa;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Form panels */
        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="login-card">
        <!-- Logo -->
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span>CYC<span class="logo-accent">WIT</span></span>
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue your IT career journey</p>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Sign Up</button>
        </div>

        <!-- Alert -->
        <div class="alert" id="alert"></div>

        <!-- LOGIN FORM -->
        <div class="form-panel active" id="loginPanel">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password"
                    autocomplete="current-password" />
            </div>
            <button class="btn-primary" id="loginBtn" onclick="loginUser()">
                <span class="btn-inner">
                    <div class="spinner" id="loginSpinner"></div>
                    <span id="loginBtnText">Sign In</span>
                </span>
            </button>

            <div class="divider">or</div>

            <button class="btn-google" onclick="loginWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Continue with Google
            </button>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="registerPanel">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="Your full name" autocomplete="name" />
            </div>
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
            </div>
            <button class="btn-primary" id="registerBtn" onclick="registerUser()">
                <span class="btn-inner">
                    <div class="spinner" id="registerSpinner"></div>
                    <span id="registerBtnText">Create Account</span>
                </span>
            </button>

            <div class="divider">or</div>

            <button class="btn-google" onclick="loginWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Sign Up with Google
            </button>
        </div>

        <p class="footer-note">
            By signing in, you agree to our <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
        </p>
    </div>

    <!-- Firebase SDK via CDN -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            updateProfile
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // ======================================================
        // 🔥 PASTE YOUR FIREBASE CONFIG HERE
        // Get it from: https://console.firebase.google.com
        //   → Your Project → Project Settings → Your Apps → Web App
        // ======================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // If already logged in → redirect to main app
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Tab switching
        window.switchTab = function (tab) {
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            hideAlert();
        };

        // Show alert
        function showAlert(msg, type = 'error') {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert ${type} show`;
        }
        function hideAlert() {
            document.getElementById('alert').classList.remove('show');
        }

        // Set button loading state
        function setLoading(btnId, spinnerId, textId, loading, text) {
            document.getElementById(btnId).disabled = loading;
            document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
            document.getElementById(textId).textContent = loading ? 'Please wait...' : text;
        }

        // Firebase error messages
        function friendlyError(code) {
            const msgs = {
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/email-already-in-use': 'An account with this email already exists.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/too-many-requests': 'Too many attempts. Try again later.',
                'auth/popup-closed-by-user': 'Sign-in popup was closed.',
                'auth/invalid-credential': 'Invalid email or password.',
            };
            return msgs[code] || 'Something went wrong. Please try again.';
        }

        // LOGIN
        window.loginUser = async function () {
            hideAlert();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showAlert('Please fill in all fields.'); return; }
            setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true, 'Sign In');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will handle redirect
            } catch (e) {
                showAlert(friendlyError(e.code));
                setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false, 'Sign In');
            }
        };

        // REGISTER
        window.registerUser = async function () {
            hideAlert();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!name || !email || !password) { showAlert('Please fill in all fields.'); return; }
            setLoading('registerBtn', 'registerSpinner', 'registerBtnText', true, 'Create Account');
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                // onAuthStateChanged will handle redirect
            } catch (e) {
                showAlert(friendlyError(e.code));
                setLoading('registerBtn', 'registerSpinner', 'registerBtnText', false, 'Create Account');
            }
        };

        // GOOGLE SIGN IN
        window.loginWithGoogle = async function () {
            hideAlert();
            try {
                await signInWithPopup(auth, googleProvider);
                // onAuthStateChanged will handle redirect
            } catch (e) {
                if (e.code !== 'auth/popup-closed-by-user') showAlert(friendlyError(e.code));
            }
        };

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const isLogin = document.getElementById('loginPanel').classList.contains('active');
                isLogin ? window.loginUser() : window.registerUser();
            }
        });
    </script>
</body>

</html>
